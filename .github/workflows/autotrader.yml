name: AutoTrader → Dart Motors Lead Sync

on:
  schedule:
    - cron: "*/15 * * * *" # every 15 minutes (AutoTrader is pull-only)
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # Same self-healing retry as the stock sync: ingest is deduped by external_id
      # so overlapping/retried runs are harmless.
      - name: Trigger AutoTrader lead sync (retry until success)
        run: |
          SUCCESS=0
          for i in 1 2 3 4 5; do
            echo "AutoTrader sync attempt $i of 5..."
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 120 \
              -X POST "${{ secrets.AUTOTRADER_SYNC_URL }}" \
              -H "Authorization: Bearer ${{ secrets.SYNC_SECRET }}")
            if [ "$STATUS" = "200" ]; then
              echo "✅ AutoTrader sync succeeded on attempt $i"
              SUCCESS=1
              break
            fi
            echo "Attempt $i returned $STATUS"
            [ "$i" -lt 5 ] && sleep $((i * 15))
          done
          if [ "$SUCCESS" != "1" ]; then
            echo "❌ All 5 AutoTrader sync attempts failed"
            exit 1
          fi
